name: EOD journal update

on:
  schedule:
    # 13:30 UTC = 19:00 IST, Mon-Fri (well after the 15:30 close).
    # GitHub cron is UTC and may start a few minutes late under load.
    - cron: '30 13 * * 1-5'
  workflow_dispatch:        # adds a "Run workflow" button for manual/test runs

permissions:
  contents: write           # lets the job commit the updated journal back

jobs:
  update-journal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Update EOD journal
        run: python eod_journal.py --journal trade_journal.csv

      - name: Commit journal
        run: |
          git config user.name  "eod-bot"
          git config user.email "actions@users.noreply.github.com"
          git add trade_journal.csv
          git diff --staged --quiet || git commit -m "EOD journal $(date -u +%F)"
          git push
